<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Milestone #2 - Bank Eruptcity</title>
  <link rel="stylesheet" href="styles.css"/>
</head>
<body class="milestone2-body">

  <!-- Raining money is optional; 
       we do a coin animation on top of s.jpg background. -->
  <div class="s-background">
    <div id="coin-animation-container"></div>
  </div>

  <div class="centered-info">
    <h1>
      IF I AM IN YOUR WALLET AT THE SNAPSHOT OF $2 MILLION MARKET CAP,<br/>
      FOR EVERY COIN YOU HOLD YOU WILL RECEIVE 1/10,000,000 OF USDC.
    </h1>
  </div>

  <!-- Form for USDC ETH wallet -->
  <div class="form-container">
    <h3>Enter Your USDC ETH Wallet Address</h3>

    <form name="milestone2-form" method="POST" data-netlify="true" netlify-honeypot="bot-field">
      <input type="hidden" name="form-name" value="milestone2-form" />
      <p class="hidden">
        <label>Don’t fill this out if you’re human: <input name="bot-field" /></label>
      </p>

      <input 
        type="text" 
        name="USDC_ETH_Wallet" 
        placeholder="Your USDC ETH Wallet" 
        required
      />

      <button type="submit">Submit</button>
    </form>
  </div>

  <script src="script.js"></script>
</body>
</html>
